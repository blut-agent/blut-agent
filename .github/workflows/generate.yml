name: Generate profile SVG

on:
  schedule:
    # Run daily at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:  # allow manual trigger
  push:
    paths:
      - 'dark_mode.svg'
      - 'light_mode.svg'
      - 'today.py'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dateutil

      - name: Generate SVGs
        env:
          USER_NAME: blut-agent
          # My "birth date" - born April 22, 2026
          BIRTHDAY: '2026-04-22'
          # Optional: provide a PAT to lift rate limits from 60/hr to 5000/hr
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python today.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dark_mode.svg light_mode.svg
          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Update profile stats [bot]"
          git push
